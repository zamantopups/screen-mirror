 1 name: Build Flutter APK
       2
       3 on:
       4   push:
       5     branches: [ main ]
       6   pull_request:
       7     branches: [ main ]
       8
       9 jobs:
      10   build:
      11     runs-on: ubuntu-latest
      12
      13     steps:
      14       - uses: actions/checkout@v3
      15
      16       - name: Set up Java
      17         uses: actions/setup-java@v3
      18         with:
      19           distribution: 'zulu'
      20           java-version: '17'
      21
      22       - name: Set up Flutter
      23         uses: subosito/flutter-action@v2
      24         with:
      25           channel: 'stable'
      26
      27       - name: Install dependencies
      28         run: flutter pub get
      29
      30       - name: Build APK
      31         run: flutter build apk --release
      32
      33       - name: Upload APK
      34         uses: actions/upload-artifact@v3
      35         with:
      36           name: app-release
      37           path: build/app/outputs/flutter-apk/app-release.apk
