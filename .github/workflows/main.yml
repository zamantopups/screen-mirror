1 name: Build Flutter APK
    2
    3 on:
    4   push:
    5     branches: [ main ]
    6   pull_request:
    7     branches: [ main ]
    8
    9 jobs:
   10   build:
   11     runs-on: ubuntu-latest
   12     steps:
   13       - uses: actions/checkout@v3
   14
   15       - name: Set up Java
   16         uses: actions/setup-java@v3
   17         with:
   18           distribution: 'zulu'
   19           java-version: '17'
   20
   21       - name: Set up Flutter
   22         uses: subosito/flutter-action@v2
   23         with:
   24           channel: 'stable'
   25
   26       - name: Install dependencies
   27         run: flutter pub get
   28
   29       - name: Build APK
   30         run: flutter build apk --release
   31
   32       - name: Upload APK
   33         uses: actions/upload-artifact@v3
   34         with:
   35           name: app-release
   36           path: build/app/outputs/flutter-apk/app-release.apk
