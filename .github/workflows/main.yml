 name: Build APK
 on: [push]
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with:
            distribution: 'zulu'
            java-version: '17'
        - uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.19.0'
            channel: 'stable'
        - name: Create and Build
          run: |
            flutter create --platforms android my_app
            cp lib/main.dart my_app/lib/main.dart
            cd my_app
            # Zaroori plugins add karna
            flutter pub add flutter_webrtc permission_handler socket_io_client
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease -x lint -x lintVitalRelease --no-daemon
        - uses: actions/upload-artifact@v4
          with:
            name: app-release
            path: my_app/build/app/outputs/flutter-apk/app-release.apk
